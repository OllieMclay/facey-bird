<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facey Bird</title>
    <style>
        body {
            margin: 0;
            background-color: #222;
            color: white;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        canvas {
            border: 4px solid #fff;
            background-color: #70c5ce;
            display: block;
        }
        #ui {
            margin-top: 10px;
            text-align: center;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background-color: #ff5722;
            color: white;
            border: none;
            border-radius: 5px;
            margin: 5px;
        }
    </style>
</head>
<body>

    <h1>Facey Bird</h1>
    <canvas id="gameCanvas" width="400" height="600"></canvas>
    
    <div id="ui">
        <p>Press <strong>Spacebar</strong> or <strong>Click/Tap</strong> to jump.</p>
        <button id="characterBtn">Switch Face</button>
    </div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

// Game variables
let gravity = 0.25;
let velocity = 0;
let jump = -5.5;
let score = 0;
let gameOver = false;

// Character Selection
const faces = [
    { name: "Ollie", color: "#ff0055", src: "face1.png" },
    { name: "Jude", color: "#00ff55", src: "face2.png" },
    { name: "Tyler", color: "#0055ff", src: "face3.png" },
    { name: "Lucas", color: "#ff0055", src: "face1.png" },
    { name: "Finley", color: "#00ff55", src: "face2.png" },
    { name: "Riley", color: "#0055ff", src: "face3.png" },
    { name: "Kai", color: "#ff0055", src: "face1.png" },
    { name: "Nathaniel", color: "#00ff55", src: "face2.png" },
    { name: "Zack", color: "#0055ff", src: "face3.png" },
    { name: "Max M", color: "#ff0055", src: "face1.png" },
    { name: "Max H", color: "#00ff55", src: "face2.png" },
    { name: "Ethan P", color: "#0055ff", src: "face3.png" },
    { name: "Ethan W", color: "#0055ff", src: "face3.png" },
    { name: "Will C", color: "#0055ff", src: "face3.png" },
    { name: "Will G", color: "#0055ff", src: "face3.png" },
    { name: "Archie", color: "#0055ff", src: "face3.png" }
];
let currentFaceIndex = 0;

// Load Bird Image
const birdImage = new Image();
let useImage = false; 

function updateCharacter() {
    birdImage.src = faces[currentFaceIndex].src;
    birdImage.onload = () => { useImage = true; };
    birdImage.onerror = () => { useImage = false; }; // Fallback to color if image doesn't exist yet
}
updateCharacter();

// Bird Object
const bird = {
    x: 50,
    y: 150,
    width: 40,
    height: 40
};

// Pipes
let pipes = [];
const pipeWidth = 60;
const pipeGap = 150;
const pipeSpeed = 2;

function spawnPipe() {
    let minHeight = 50;
    let maxHeight = canvas.height - pipeGap - 100;
    let height = Math.floor(Math.random() * (maxHeight - minHeight + 1)) + minHeight;
    
    pipes.push({
        x: canvas.width,
        top: height,
        bottom: canvas.height - height - pipeGap,
        passed: false
    });
}

// Reset Game
function resetGame() {
    bird.y = 150;
    velocity = 0;
    pipes = [];
    score = 0;
    gameOver = false;
    spawnPipe();
}

// Controls
function handleJump() {
    if (gameOver) {
        resetGame();
    } else {
        velocity = jump;
    }
}

document.addEventListener("keydown", (e) => {
    if (e.code === "Space") handleJump();
});
canvas.addEventListener("click", handleJump);

document.getElementById("characterBtn").addEventListener("click", (e) => {
    e.stopPropagation(); // Stop from triggering a jump
    currentFaceIndex = (currentFaceIndex + 1) % faces.length;
    updateCharacter();
    resetGame();
});

// Game Loop
function update() {
    if (!gameOver) {
        // Physics
        velocity += gravity;
        bird.y += velocity;

        // Floor / Ceiling collisions
        if (bird.y + bird.height >= canvas.height || bird.y <= 0) {
            gameOver = true;
        }

        // Pipe logic
        for (let i = pipes.length - 1; i >= 0; i--) {
            pipes[i].x -= pipeSpeed;

            // Collision check
            if (
                bird.x < pipes[i].x + pipeWidth &&
                bird.x + bird.width > pipes[i].x &&
                (bird.y < pipes[i].top || bird.y + bird.height > canvas.height - pipes[i].bottom)
            ) {
                gameOver = true;
            }

            // Score check
            if (!pipes[i].passed && pipes[i].x + pipeWidth < bird.x) {
                score++;
                pipes[i].passed = true;
            }

            // Remove off-screen pipes
            if (pipes[i].x + pipeWidth < 0) {
                pipes.splice(i, 1);
            }
        }

        // Spawn new pipes
        if (pipes.length === 0 || pipes[pipes.length - 1].x < canvas.width - 200) {
            spawnPipe();
        }
    }
}

function draw() {
    // Clear canvas
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Draw Bird (Image or colored circle fallback)
    if (useImage) {
        ctx.drawImage(birdImage, bird.x, bird.y, bird.width, bird.height);
    } else {
        ctx.fillStyle = faces[currentFaceIndex].color;
        ctx.beginPath();
        ctx.arc(bird.x + bird.width/2, bird.y + bird.height/2, bird.width/2, 0, Math.PI * 2);
        ctx.fill();
    }

    // Draw Pipes
    ctx.fillStyle = "#2e8b57";
    pipes.forEach(pipe => {
        // Top pipe
        ctx.fillRect(pipe.x, 0, pipeWidth, pipe.top);
        // Bottom pipe
        ctx.fillRect(pipe.x, canvas.height - pipe.bottom, pipeWidth, pipe.bottom);
    });

    // Draw Score
    ctx.fillStyle = "white";
    ctx.font = "30px Arial";
    ctx.fillText(`Score: ${score}`, 10, 40);
    ctx.font = "16px Arial";
    ctx.fillText(`Playing as: ${faces[currentFaceIndex].name}`, 10, 70);

    // Game Over Text
    if (gameOver) {
        ctx.fillStyle = "rgba(0,0,0,0.5)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        ctx.fillStyle = "white";
        ctx.font = "40px Arial";
        ctx.textAlign = "center";
        ctx.fillText("GAME OVER", canvas.width / 2, canvas.height / 2);
        ctx.font = "20px Arial";
        ctx.fillText("Click or Space to Restart", canvas.width / 2, canvas.height / 2 + 40);
        ctx.textAlign = "left"; // reset alignment
    }
}

function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
}

// Start Game
resetGame();
loop();
</script>

</body>
</html>
